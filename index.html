<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <link
        <<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
        
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ff8fa3;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #590d22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
          .instructions h1 {
    font-family: 'Cairo', sans-serif;
}
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* Ambient Background Animations */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 10%;
            animation-duration: 25s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 20%;
            right: 10%;
            animation-duration: 30s;
        }

        .shape:nth-child(3) {
            width: 100px;
            height: 100px;
            top: 40%;
            left: 50%;
            animation-duration: 35s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(20px, 40px) rotate(180deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        /* Game Container */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        #game-stage.hidden {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .instructions {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .instructions h1 {
           font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .instructions p {
            font-size: 1.2rem;
        }

        .score-board {
            margin-top: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Hidden Hearts */
        .heart-target {
            position: absolute;
            font-size: 2.5rem;
            color: #d62828;
            /* Slightly darker to blend but identifiable if looked for */
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
            filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.3));
            animation: pulse-soft 3s infinite;
        }

        .heart-target:hover {
            transform: scale(1.2);
            color: #ff0000;
        }

        /* Random positions for hearts (will be set by JS mostly, but examples here) */

        @keyframes pulse-soft {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Envelope Stage */
        #envelope-stage {
    display: flex;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
}

        #envelope-stage.visible {
    opacity: 1;
    pointer-events: all;
}

        .envelope-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .envelope-container:hover {
            transform: scale(1.05);
        }

        .envelope {
            width: 300px;
            height: 200px;
            background: #ff4d6d;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 110px solid #ff758f;
            /* Lighter shade */
            transform-origin: top;
            transition: transform 0.6s ease 0.5s, z-index 0.2s;
            z-index: 5;
        }

        .pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 200px solid #ff4d6d;
            z-index: 3;
        }

        .letter-preview {
            width: 260px;
            height: 180px;
            background: white;
            position: absolute;
            bottom: 0;
            border-radius: 5px;
            z-index: 2;
            transition: transform 0.8s ease 1s;
        }

        .seal {
            width: 40px;
            height: 40px;
            background: #d00000;
            border-radius: 50%;
            position: absolute;
            top: 80px;
            left: 130px;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffcccb;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: opacity 0.5s ease;
        }

        /* Open state for envelope */
        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-container.open .seal {
            opacity: 0;
            pointer-events: none;
        }

        .envelope-container.open .letter-preview {
            transform: translateY(-100px);
            z-index: 4;
        }

        .open-btn {
            margin-top: 3rem;
            padding: 1rem 3rem;
            background: white;
            color: var(--primary-color);
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
            background: #fff0f3;
        }

        /* Full Letter View */
        #letter-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 50;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #letter-view.active {
            display: flex;
            opacity: 1;
        }

        .love-letter {
            background: #fff;
            width: 90%;
            max-width: 600px;
            padding: 3rem;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            background-image: repeating-linear-gradient(white 0px, white 24px, #e9ecef 25px);
            line-height: 25px;
            transform: scale(0.8);
            transition: transform 0.5s ease;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
            -webkit-overflow-scrolling: touch;
        }

        #letter-view.active .love-letter {
            transform: scale(1);
        }

        .love-letter h2 {
            font-family: 'Cairo', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
        }

        .love-letter p {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
            background: none;
            border: none;
        }

        .close-btn:hover {
            color: #333;
        }

        /* Sparkle animation for finding heart */
        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleAnim 0.8s ease-out forwards;
            font-size: 20px;
            color: gold;
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: scale(2) rotate(180deg);
                opacity: 0;
            }
        }
        .typing {
    direction: rtl;          /* 🔥 من اليمين لليسار */
    text-align: right;       /* محاذاة لليمين */
    unicode-bidi: plaintext; /* يحافظ على ترتيب النص */
}
.flash-effect {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: radial-gradient(circle, #ff4d6d, white);
    opacity: 0;
    pointer-events: none;
    z-index: 999;

    animation: flashAnim 0.8s ease;
}

@keyframes flashAnim {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
}
.shake {
    animation: shakeScreen 0.5s;
}

@keyframes shakeScreen {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-5px, 5px); }
    50% { transform: translate(5px, -5px); }
    75% { transform: translate(-5px, -5px); }
    100% { transform: translate(0, 0); }
}
    </style>
</head>

<body>

    <!-- Background Shapes -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Game Stage -->
    <div id="game-stage">
        <div class="instructions">
            <h1>أعثري على حروف إسمي </h1>
            <p>كل شكل يمثل حرفا من إسمي يا هاجر كوني ذكية .<br>إضغط عليهم حسب ترتيب إسمي يا شطورة</p>
            <div class="score-board">Hearts Found: <span id="counter">0</span>/7</div>
        </div>

        <!-- Hiding Spots Container -->
        <div class="hiding-spots-container">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Envelope Stage -->
    <div id="envelope-stage">
        <div class="envelope-container" id="envelope">
            <div class="envelope">
                <div class="pocket"></div>
                <!-- The letter inside -->
                <div class="letter-preview"></div>
                <div class="flap"></div>
                <div class="seal">❤️</div>
            </div>
        </div>
        <button class="open-btn" onclick="openEnvelope()">Open Me</button>
    </div>

    <!-- Full Letter View -->
    <div id="letter-view">
        <div class="love-letter">
            <button class="close-btn" onclick="closeLetter()">×</button>
            <h2 class="typing" data-text=" رسالة من سامي,"></h2>
            <p class="typing" data-text="السلام عليكم يا هاجرررربل ."></p>
            <p class="typing" data-text="بليبلبلقلقللdden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="ثقلقثلقثلقثلثقلقثلثقل."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p class="typing" data-text="Just like you found these hidden hearts, you've found the deepest parts of my soul."></p>
            <p style="text-align: right;">- الرد كما تريدين</p>
        </div>
    </div>

    <style>
        /* Additional Styles for Hiding Spots */
        .hiding-spots-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            max-width: 800px;
            padding: 20px;
            z-index: 15;
            perspective: 1000px;
        }

        .hiding-spot {
            font-size: 3.5rem;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s;
            position: relative;
            user-select: none;
            filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.1));
        }

        .hiding-spot:hover {
            transform: scale(1.1) translateY(-5px);
        }

        .hiding-spot.shaking {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
            color: #ccc;
            /* Fade out slightly to show checked */
            cursor: default;
        }

        .hiding-spot.revealed {
            animation: popOpen 0.5s ease forwards;
            pointer-events: none;
        }

        .hidden-heart-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 2rem;
            color: #ff0000;
            pointer-events: none;
            z-index: 20;
        }

        .pop-anim {
            animation: popHeart 1s ease forwards;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        @keyframes popOpen {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        @keyframes popHeart {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            50% {
                transform: translate(-50%, -150%) scale(2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -300%) scale(0);
                opacity: 0;
            }
        }

        /* Adjust game stage layout for grid */
        #game-stage {
            display: flex;
            /* Ensure flex for centering */
        }
        .char {
    display: inline-block;
    animation: pulseChar 0.3s ease;
}

@keyframes pulseChar {
    0% {
        transform: scale(0.8);
        opacity: 0.5;
    }
    50% {
        transform: scale(1.3);
        opacity: 1;
    }
    100% {
        transform: scale(1);
    }
}
    </style>

    <script>
let currentStep = 0;
const totalItems = 7;

// 👇 أنت تتحكم في الترتيب هنا (0 إلى 5)
const secretOrder = [0, 1, 6, 2, 4, 3 , 5];
        const hidingItems = ['🌙', '⚪', '🐍', '🕯️', '📐', '🌙', '🧲'];
        let spots = [];

        window.onload = function () {
            initGame();
        };

        function initGame() {
    const container = document.querySelector('.hiding-spots-container');
    container.innerHTML = "";

    const displayItems = hidingItems.slice(0, 7);

    displayItems.forEach((icon, index) => {
        const spot = document.createElement('div');
        spot.classList.add('hiding-spot');
        spot.innerText = icon;

        spot.dataset.index = index;

        spot.onclick = () => checkSpot(spot);

        container.appendChild(spot);
    });
}
function checkSpot(element) {
    const index = parseInt(element.dataset.index);

    if (element.classList.contains('shaking') || element.classList.contains('revealed'))
        return;

    // ❌ غلط في الترتيب
    if (index !== secretOrder[currentStep]) {
        element.classList.add('shaking');
        setTimeout(() => element.classList.remove('shaking'), 500);
        return;
    }

    // ✅ صحيح
    element.classList.add('revealed');

    const heart = document.createElement('div');
    heart.classList.add('hidden-heart-popup', 'pop-anim');
    heart.innerText = '❤️';
    element.appendChild(heart);

    currentStep++;

    document.getElementById('counter').innerText = currentStep;

    const rect = element.getBoundingClientRect();
    createSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2);

    if (currentStep === totalItems) {
        setTimeout(revealEnvelope, 1200);
    }
}
        function createSparkles(x, y) {
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.innerText = '✨';
                sparkle.style.left = (x + (Math.random() * 40 - 20)) + 'px';
                sparkle.style.top = (y + (Math.random() * 40 - 20)) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        }

     function revealEnvelope() {
    const gameStage = document.getElementById('game-stage');
    const envelopeStage = document.getElementById('envelope-stage');

    gameStage.style.display = 'none';

    envelopeStage.style.display = 'flex';

    setTimeout(() => {
        envelopeStage.classList.add('visible');
    }, 50);
}

        function openEnvelope() {
            const envContainer = document.getElementById('envelope');
            const letterView = document.getElementById('letter-view');
            envContainer.classList.add('open');
           setTimeout(() => {
    createFlash();
    shakeScreen();
    letterView.classList.add('active');
    createConfetti();

    startTypingEffect(); // 👈 هذا هو الإصلاح المهم
}, 1500);
        }

        function closeLetter() {
            document.getElementById('letter-view').classList.remove('active');
        }

        function createConfetti() {
    const colors = ['#ff4d6d', '#ff8fa3', '#fff', 'gold'];

    for (let i = 0; i < 50; i++) {
        const conf = document.createElement('div');

        conf.style.position = 'fixed';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.top = -10 + 'px';
        conf.style.width = '10px';
        conf.style.height = '10px';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

        conf.style.animation = `float ${Math.random() * 3 + 2}s linear forwards`;

        document.body.appendChild(conf);

        setTimeout(() => conf.remove(), 5000);
    }
}
        function typeText(element, text, speed = 40) {
    let i = text.length;
    element.innerHTML = "";

    function typing() {
        if (i >= 0) {
            let visibleText = text.substring(i);

            let styledText = visibleText
                .split("")
                .map((char, index) => {
                    return index === 0
                        ? `<span class="char">${char}</span>`
                        : char;
                })
                .join("");

            element.innerHTML = styledText;

            i--;
            setTimeout(typing, speed);
        }
    }

    typing();
}

function startTypingEffect() {
    const paragraphs = document.querySelectorAll('.typing');

    paragraphs.forEach((p, index) => {
        const text = p.getAttribute('data-text');

        setTimeout(() => {
            typeText(p, text);
        }, index * 1500);
    });
}
function createFlash() {
    const flash = document.createElement('div');

    Object.assign(flash.style, {
        position: 'fixed',
        top: 0,
        left: 0,
        width: '100%',
        height: '100%',
        background: 'radial-gradient(circle, #fff, #ff4d6d)',
        zIndex: 45454555555,
        opacity: 0,
        pointerEvents: 'none',
        animation: 'flashAnim 0.8s ease'
    });

    document.body.appendChild(flash);

    setTimeout(() => flash.remove(), 800);
}

function shakeScreen() {
    document.body.classList.add('shake');

    setTimeout(() => {
        document.body.classList.remove('shake');
    }, 500);

    // 🔥 اهتزاز الهاتف الحقيقي (إذا مدعوم)
    if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
    }
}
    </script>
